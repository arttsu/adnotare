name: CI Package

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.build_os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            build_os: macos
            arch: arm64
            artifact_glob: target/dist/archives/Adnotare-macos-*.zip
          - runner: windows-latest
            build_os: windows
            arch: x64
            artifact_glob: target/dist/archives/Adnotare-windows-*.zip
          - runner: ubuntu-latest
            build_os: linux
            arch: x64
            artifact_glob: target/dist/archives/Adnotare-linux-*.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Clojure (pinned for Windows MSI availability)
        uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: 1.12.4.1582

      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Clojure CLI
        shell: pwsh
        run: |
          Get-Command clojure
          clojure -Sdescribe

      - name: Build dist archive
        shell: pwsh
        run: |
          clojure -T:build dist `
            :os :${{ matrix.build_os }} `
            :version "${{ steps.ver.outputs.version }}" `
            :arch "${{ matrix.arch }}"

      - name: List dist outputs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse target\dist | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Adnotare-${{ matrix.build_os }}-${{ steps.ver.outputs.version }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.tar.gz
          generate_release_notes: true
